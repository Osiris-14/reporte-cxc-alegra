name: Exportar Calendario de Instalacion

on:
  workflow_run:
    workflows: ["Ejecutar detalles"]
    types:
      - completed
  workflow_dispatch:          # permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  exportar-calendario:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements_calendario.txt

      - name: Ejecutar script
        run: python exportar_calendario.py
        env:
          CI: "true"
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}

      - name: Subir CSV actualizado
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add calendario_instalacion.csv
          git commit -m "Actualizacion automatica del calendario" || echo "No changes"
          git push